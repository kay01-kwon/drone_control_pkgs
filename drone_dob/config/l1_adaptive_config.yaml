/**:
  ros__parameters:
    drone:
      m: 3.000
      l: 0.265
      MoiArray: [0.060, 0.060, 0.080]
      motor_const: 1.3175e-07
      moment_const: 0.01569

    l1_adaptive:
      dob_looptime: 0.010
      As_array: [-15.0, -15.0, -15.0,    # vx, vy, vz (Body frame)
                 -15.0, -15.0, -15.0]    # wx, wy ,wz (Body frame)
      freq_cutoff_trans: 2.0
      freq_cutoff_rot: 2.0

      # In-flight hysteresis (avoids chattering when drone briefly contacts ground).
      # ENTER uses thrust_margin_in=0.90 (hover-active check, not a strict floor)
      # to avoid the deadlock where unmodeled mass keeps actual thrust ≤ W and
      # the drone stuck below alt_enter forever.
      alt_enter: 0.03            # [m]   enter airborne if altitude > 3 cm
      alt_exit:  0.02            # [m]   exit  airborne if altitude < 2 cm
      thrust_margin_in:  0.90    # enter requires thrust > 0.90 * W
      thrust_margin_out: 0.60    # exit  contributes when thrust < 0.60 * W
      enter_dwell_n: 30          # samples to confirm entry (~0.3 s @ 100 Hz)
      exit_dwell_n:  50          # samples to confirm exit  (~0.5 s)

      # Body angular velocity LPF (0 disables).  cutoff >> attitude bandwidth.
      omega_filter_cutoff_hz: 0.0
      # Body linear velocity LPF (0 disables).  cutoff >> outer-loop bandwidth.
      lin_vel_filter_cutoff_hz: 0.0

    topic_names:
      odom_in: "/mavros/local_position/odom"
      filtered_odom: "/l1_adaptive/filtered_odom"
      actual_rpm: "/uav/actual_rpm"
      base_line_control: "/nmpc/control"
      dob_wrench: "/l1_adaptive/wrench"