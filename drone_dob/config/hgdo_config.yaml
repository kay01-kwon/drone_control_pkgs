/**:
  ros__parameters:
    drone:
      m: 3.146
      l: 0.265
      MoiArray: [0.060, 0.060, 0.080]
      motor_const: 1.2895e-07
      moment_const: 0.01569

    dob:
      dob_looptime: 0.010
      eps_f: 1.0
      eps_tau: 0.1

      # In-flight hysteresis (avoids chattering when drone briefly contacts ground)
      alt_enter: 0.05            # [m]   enter airborne if altitude > 5 cm
      alt_exit:  0.02            # [m]   exit  airborne if altitude < 2 cm
      thrust_margin_in:  1.05    # enter requires thrust > 1.05 * W
      thrust_margin_out: 0.60    # exit  contributes when thrust < 0.60 * W
      enter_dwell_n: 30          # samples to confirm entry (~0.3 s @ 100 Hz)
      exit_dwell_n:  50          # samples to confirm exit  (~0.5 s)

      # Body angular velocity LPF (0 disables).  EKF2 output ω is already
      # estimator-smoothed, so this is intended for additional gyro/vibration
      # noise suppression — keep cutoff >> attitude bandwidth (~1.6 Hz).
      omega_filter_cutoff_hz: 0.0  # default off; try 30–50 Hz if needed

    topic_names:
      odom_in: "/mavros/local_position/odom"
      filtered_odom: "/hgdo/filtered_odom"
      actual_rpm: "/uav/actual_rpm"
      dob_wrench: "/hgdo/wrench"