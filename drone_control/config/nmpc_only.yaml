/**:
  ros__parameters:
    dynamic_param:
      m: 3.144
      MoiArray: [0.06, 0.06, 0.08]

    drone_param:
      arm_length: 0.265
      motor_const: 1.386e-07
      moment_const: 0.01569
      rotor_max: 7300.0     # Maximum RPM
      rotor_min: 2000.0     # Minimum RPM
      acc_max: 15000.0    # Rotor Acc 15 krpm/s
      acc_min: 15000.0    # Rotor Dec 15 krpm/s
      cmd_lpf_cutoff: 10.0  # LPF cutoff frequency [Hz] for cmd output

    nmpc_param:
      t_horizon: 1.0
      n_nodes: 20
      QArray: [ 2.0, 2.0, 5.0,        # px, py, pz
                0.8, 0.8, 1.5,        # vx, vy, vz
                5.0, 5.0, 5.0, 5.0,   # qw, qx, qy, qz
                0.5, 0.5, 0.5]     # wx, wy, wz
      R: [10.0]     # u1...u6
      roll_max_deg: 15.0    # Roll constraint [deg]
      pitch_max_deg: 15.0   # Pitch constraint [deg]
      pitch_soft_Zl: 1000.0  # Pitch soft constraint L2 lower penalty
      pitch_soft_Zu: 1000.0  # Pitch soft constraint L2 upper penalty
      pitch_soft_zl: 100.0   # Pitch soft constraint L1 lower penalty
      pitch_soft_zu: 100.0   # Pitch soft constraint L1 upper penalty

    sensor_time_param:
      timeout:
        rc: 0.10
        odom: 0.10
        do: 0.10
    topic_names:
      cmd_topic: '/uav/cmd_raw'
      base_line_control_topic: '/nmpc/control'
      filtered_odom_topic: '/mavros/local_position/odom_sim'
      ref_topic: '/nmpc/ref'