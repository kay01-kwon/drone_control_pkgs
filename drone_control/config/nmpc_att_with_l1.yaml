/**:
  ros__parameters:
    dynamic_param:
      m: 3.1880
      MoiArray: [0.06, 0.06, 0.08]
      first_trial: false               # Boolean!
      com_offset: [-0.008998, 0.0]    # x,y offset

    drone_param:
      arm_length: 0.265
      motor_const: 1.386e-07
      moment_const: 0.01569
      rotor_max: 7300.0     # Maximum RPM
      rotor_min: 2000.0     # Minimum RPM
      acc_max: 15000.0    # Acc 15 krpm/s
      acc_min: 15000.0    # Dec 15 krpm/s
      cmd_lpf_cutoff: 10.0  # LPF cutoff frequency [Hz] for cmd output

    nmpc_param:
      t_horizon: 1.0
      n_nodes: 20
      QArray: [ 8.0, 8.0, 8.0, 8.0,   # qw, qx, qy, qz
                5.0, 5.0, 5.0]         # wx, wy, wz
      R: [5.0]     # u1...u6

    rc_converter_param:
      vxy_max: 0.3
      vz_max: 0.3
      dpsi_dt_max: 0.2

    thrust_ramp_param:
      threshold_angle: 0.05     # rad (~2.9 deg)
      f_dot_ramp_up: 2.0        # N/s

    topic_names:
      cmd_topic: '/uav/cmd_raw'
      base_line_control_topic: '/nmpc_att/control'
      filtered_odom_topic: '/l1_adaptive/filtered_odom'
      rc_topic: '/mavros/rc/in'
      dob_wrench_topic: '/l1_adaptive/wrench'
