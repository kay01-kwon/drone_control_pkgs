/**:
  ros__parameters:
    dynamic_param:
      m: 3.146
      MoiArray: [0.06, 0.06, 0.08]
      moment_ff: false
      com_offset: [-0.01043,0.00496]
      vel_correction: false

    drone_param:
      arm_length: 0.265
      motor_const: 1.386e-07
      moment_const: 0.01569
      rotor_max: 7300.0
      rotor_min: 2000.0
      acc_max: 15000.0
      acc_min: 15000.0

    pd_param:
      Kp: [2.0, 2.0, 4.0]         # Position P gain [1/s^2]
      Kd: [2.83, 2.83, 4.0]       # Velocity D gain [1/s] (critically damped)
      Ki: [0.0, 0.0, 0.0]         # Integral gain [1/s^3]
      anti_windup: [1.0, 1.0, 1.0] # Integral anti-windup limit [m/s^2]
      dpsi_dt_max: 0.5            # Max yaw rate [rad/s] — ramp yaw ref to
                                  # prevent NMPC from saturating rotors on
                                  # yaw step and losing roll/pitch authority

    nmpc_param:
      publish_state: true
      t_horizon: 1.0
      n_nodes: 20
      QArray: [20.0, 20.0, 10.0,     # q_e_x, q_e_y, q_e_z
               0.3, 0.3, 0.15]       # wx, wy, wz
      R: [1.0]                        # u1...u6
      tanh_k: 100.0

    topic_names:
      cmd_topic: '/uav/cmd_raw'
      rc_topic: '/mavros/rc/in'
      base_line_control_topic: '/nmpc/control'
      state_topic: '/nmpc/state'
      filtered_odom_topic: '/mavros/local_position/odom'
      ref_topic: '/nmpc/ref'
      dob_wrench_topic: '/hgdo/wrench'
