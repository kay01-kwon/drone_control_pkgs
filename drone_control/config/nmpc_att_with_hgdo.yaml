/**:
  ros__parameters:
    dynamic_param:
      m: 3.188
      MoiArray: [0.06, 0.06, 0.08]

    drone_param:
      arm_length: 0.265
      motor_const: 1.386e-07
      moment_const: 0.01569
      rotor_max: 7300.0     # Maximum RPM
      rotor_min: 2000.0     # Minimum RPM
      acc_max: 15000.0    # Acc 15 krpm/s
      acc_min: 15000.0    # Dec 15 krpm/s
      cmd_lpf_cutoff: 10.0  # LPF cutoff frequency [Hz] for cmd output

    nmpc_param:
      t_horizon: 1.0
      n_nodes: 20
      QArray: [ 50.0, 50.0, 2.0,      # q_e_x, q_e_y, q_e_z
                0.9, 0.9, 0.1]        # wx, wy, wz
      R: [1.0]     # u1...u6
      tanh_k: 100.0  # Sign approx steepness for quaternion double cover

    rc_converter_param:
      vxy_max: 0.3
      vz_max: 0.3
      dpsi_dt_max: 0.2

    reference_param:
      use_fixed_ref: false       # true: fixed hover ref [1,0,0,0],[0,0,0]
                                # false: receive ref from rpy_ref_topic (RpyRef)
      use_dob_compensation: true  # true: subtract DOB wrench from NMPC moment
                                  # false: NMPC only (no DOB compensation)
      dpsi_dt_max: 0.5            # Yaw rate limit for ref ramping [rad/s]
      dob_axis_mode: 'free'        # which torque axis (axes) to compensate:
                                #   'x'    : roll only   (roll-axis test stand)
                                #   'y'    : pitch only  (pitch-axis test stand)
                                #   'free' : all three   (free flight)
                                # DOB on a constrained axis is invalid — the
                                # stand reaction torque is absorbed as "disturbance"
                                # and drifts without bound through the closed loop.
    topic_names:
      cmd_topic: '/uav/cmd_raw'
      base_line_control_topic: '/nmpc/control'
      filtered_odom_topic: '/mavros/local_position/odom'
      rc_topic: '/mavros/rc/in'
      dob_wrench_topic: '/hgdo/wrench'
      des_thrust_topic: '/des_thrust'
      rpy_ref_topic: '/des_rpy'
