/**:
  ros__parameters:
    dynamic_param:
      m: 3.146
      MoiArray: [0.06, 0.06, 0.08]
      moment_ff: false
      com_offset: [-0.01043,0.00496]

    drone_param:
      arm_length: 0.265
      motor_const: 1.386e-07
      moment_const: 0.01569
      rotor_max: 7300.0     # Maximum RPM
      rotor_min: 2000.0     # Minimum RPM
      acc_max: 15000.0    # Acc 15 krpm/s
      acc_min: 15000.0    # Dec 15 krpm/s
      cmd_lpf_cutoff: 10.0  # LPF cutoff frequency [Hz] for cmd output

    nmpc_param:
      t_horizon: 1.0
      n_nodes: 20
      # QArray: [ 1.0, 1.0, 7.0,        # px, py, pz
      #           0.5, 0.5, 4.0,        # vx, vy, vz
      #           20.0, 20.0, 20.0,     # q_e_x, q_e_y, q_e_z
      #           5.0, 5.0, 5.0]        # wx, wy, wz
      # R: [10.0]     # u1...u6
      QArray: [ 2.0, 2.0, 5.0,        # px, py, pz
                1.0, 1.0, 2.0,        # vx, vy, vz
                5.0, 5.0, 3.0,        # q_e_x, q_e_y, q_e_z
                2.0, 2.0, 1.0]        # wx, wy, wz
      R: [10.0]     # u1...u6
      tanh_k: 100.0  # Sign approx steepness for quaternion double cover
      roll_max_deg: 15.0    # Roll constraint [deg]
      pitch_max_deg: 15.0   # Pitch constraint [deg]
      pitch_soft_Zl: 1000.0  # Pitch soft constraint L2 lower penalty
      pitch_soft_Zu: 1000.0  # Pitch soft constraint L2 upper penalty
      pitch_soft_zl: 100.0   # Pitch soft constraint L1 lower penalty
      pitch_soft_zu: 100.0   # Pitch soft constraint L1 upper penalty
      roll_soft_Zl: 1000.0   # Roll soft constraint L2 lower penalty
      roll_soft_Zu: 1000.0   # Roll soft constraint L2 upper penalty
      roll_soft_zl: 100.0    # Roll soft constraint L1 lower penalty
      roll_soft_zu: 100.0    # Roll soft constraint L1 upper penalty

    topic_names:
      cmd_topic: '/uav/cmd_raw'
      rc_topic: '/mavros/rc/in'
      base_line_control_topic: '/nmpc/control'
      filtered_odom_topic: '/mavros/local_position/odom'
      ref_topic: '/nmpc/ref'
      dob_wrench_topic: '/l1_adaptive/wrench'